<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}PyPI Monitor{% endblock %}</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
  --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
  --red: #f85149; --orange: #d29922; --yellow: #e3b341;
  --green: #3fb950; --cyan: #39d2c0; --purple: #bc8cff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }
a { color:var(--accent); text-decoration:none; }
a:hover { text-decoration:underline; }

/* ── Sidebar ─────────────────────────────── */
.sidebar { width:220px; background:var(--bg2); border-right:1px solid var(--border); padding:16px 0; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:10; }
.sidebar .logo { padding:0 20px 20px; font-size:15px; font-weight:700; color:var(--accent); border-bottom:1px solid var(--border); margin-bottom:8px; line-height:1.4; }
.sidebar .logo small { color:var(--text2); font-weight:400; font-size:11px; display:block; }
.sidebar nav a { display:flex; align-items:center; gap:10px; padding:10px 20px; color:var(--text2); font-size:13px; transition:background .15s; }
.sidebar nav a:hover, .sidebar nav a.active { background:var(--bg3); color:var(--text); text-decoration:none; }
.sidebar nav a .icon { width:18px; text-align:center; font-size:15px; }
.sidebar .status-pill { margin:auto 20px 16px; padding:8px 12px; border-radius:8px; font-size:11px; text-align:center; border:1px solid var(--border); }
.sidebar .status-pill.running { border-color:var(--green); color:var(--green); }
.sidebar .status-pill.stopped { border-color:var(--red); color:var(--red); }

/* ── Main ────────────────────────────────── */
.main { margin-left:220px; flex:1; padding:28px 32px; min-height:100vh; }
h1 { font-size:22px; font-weight:600; margin-bottom:20px; }
h2 { font-size:16px; font-weight:600; margin-bottom:12px; color:var(--text2); }

/* ── Cards ───────────────────────────────── */
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:28px; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:18px 16px; }
.card .label { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--text2); margin-bottom:6px; }
.card .value { font-size:26px; font-weight:700; }
.card .value.critical { color:var(--red); }
.card .value.high { color:var(--orange); }
.card .value.medium { color:var(--yellow); }
.card .value.low { color:var(--cyan); }
.card .value.green { color:var(--green); }

/* ── Table ───────────────────────────────── */
.tbl-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:28px; }
.tbl-head { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border); }
.tbl-head h2 { margin:0; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { text-align:left; padding:10px 14px; color:var(--text2); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.6px; border-bottom:1px solid var(--border); }
tbody td { padding:10px 14px; border-bottom:1px solid var(--border); vertical-align:top; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover { background:var(--bg3); }

/* ── Severity badges ─────────────────────── */
.badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; letter-spacing:.5px; }
.badge.CRITICAL { background:rgba(248,81,73,.15); color:var(--red); }
.badge.HIGH { background:rgba(210,153,34,.15); color:var(--orange); }
.badge.MEDIUM { background:rgba(227,179,65,.15); color:var(--yellow); }
.badge.LOW { background:rgba(57,210,192,.15); color:var(--cyan); }
.badge.INFO { background:rgba(139,148,158,.15); color:var(--text2); }
.badge.clean { background:rgba(63,185,80,.15); color:var(--green); }

/* ── Buttons ─────────────────────────────── */
.btn { display:inline-block; padding:7px 16px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--bg3); color:var(--text); transition:background .15s; }
.btn:hover { background:var(--border); text-decoration:none; }
.btn.green { border-color:var(--green); color:var(--green); }
.btn.green:hover { background:rgba(63,185,80,.15); }
.btn.red { border-color:var(--red); color:var(--red); }
.btn.red:hover { background:rgba(248,81,73,.15); }
.btn.sm { padding:4px 10px; font-size:11px; }

/* ── Forms/inputs ────────────────────────── */
input[type=text], input[type=number], select {
  background:var(--bg); border:1px solid var(--border); color:var(--text);
  padding:7px 12px; border-radius:6px; font-size:13px; outline:none;
}
input:focus, select:focus { border-color:var(--accent); }

/* ── Log viewer ──────────────────────────── */
.log-box { background:#010409; border:1px solid var(--border); border-radius:10px; padding:16px; font-family:'Menlo','Courier New',monospace; font-size:12px; line-height:1.7; max-height:600px; overflow-y:auto; color:var(--text2); white-space:pre-wrap; word-break:break-all; }

/* ── Misc ────────────────────────────────── */
.flex { display:flex; align-items:center; gap:10px; }
.mb { margin-bottom:16px; }
.text-muted { color:var(--text2); font-size:12px; }
.empty-state { text-align:center; padding:48px 20px; color:var(--text2); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }

@media(max-width:800px){
  .sidebar{width:60px;} .sidebar .logo span,.sidebar nav a span{display:none;} .main{margin-left:60px;padding:16px;}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    🛡️ <span>PyPI Hunter</span>
    <small>GitHub Release Monitor</small>
  </div>
  <nav>
    <a href="/" class="{% if active == 'dashboard' %}active{% endif %}"><span class="icon">📊</span> <span>Dashboard</span></a>
    <a href="/flagged" class="{% if active == 'flagged' %}active{% endif %}"><span class="icon">🚩</span> <span>Flagged</span></a>
    <a href="/logs" class="{% if active == 'logs' %}active{% endif %}"><span class="icon">📜</span> <span>Logs</span></a>
    <a href="/settings" class="{% if active == 'settings' %}active{% endif %}"><span class="icon">⚙️</span> <span>Settings</span></a>
  </nav>
  <div class="status-pill stopped" id="sidebar-status">● Connecting…</div>
</aside>

<main class="main">
  {% block content %}{% endblock %}
</main>

<script>
/* ── Shared helpers ───────────────────────── */
async function api(path,opts){const r=await fetch(path,opts);return r.json();}

async function refreshStatus(){
  const s=await api('/api/status');
  const el=document.getElementById('sidebar-status');
  if(s.running){el.textContent='● Running';el.className='status-pill running';}
  else{el.textContent='● Stopped';el.className='status-pill stopped';}
  return s;
}
setInterval(refreshStatus,3000);
refreshStatus();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
