{% extends "layout.html" %}
{% set active = "logs" %}
{% block title %}Logs – TrendAI ZDI TeamPCP Hunter{% endblock %}

{% block content %}
<div class="flex mb" style="justify-content:space-between;">
  <h1>📜 Live Logs</h1>
  <div class="flex">
    <label class="text-muted"><input type="checkbox" id="auto-scroll" checked> Auto-scroll</label>
    <button class="btn sm" onclick="clearLogs()">Clear View</button>
  </div>
</div>

<div class="log-box" id="log-box">Connecting…</div>
{% endblock %}

{% block scripts %}
<script>
const box=document.getElementById('log-box');

async function refreshLogs(){
  const data=await api('/api/logs');
  if(!data.length){box.textContent='No logs yet.';return;}
  // data is newest-first, reverse for display
  box.textContent=data.slice().reverse().join('\n');
  if(document.getElementById('auto-scroll').checked){
    box.scrollTop=box.scrollHeight;
  }
}

function clearLogs(){box.textContent='';}

refreshLogs();
setInterval(refreshLogs,3000);
</script>
{% endblock %}
