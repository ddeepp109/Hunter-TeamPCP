{% extends "layout.html" %}
{% set active = "flagged" %}
{% block title %}Flagged Packages – PyPI Monitor{% endblock %}

{% block content %}
<h1>🚩 Flagged Packages</h1>

<div class="flex mb" style="gap:12px;flex-wrap:wrap;">
  <select id="sev-filter" onchange="reload()">
    <option value="">All Severities</option>
    <option value="CRITICAL">Critical</option>
    <option value="HIGH">High</option>
    <option value="MEDIUM">Medium</option>
    <option value="LOW">Low</option>
  </select>
  <input type="text" id="search-input" placeholder="Search name, author, reason…" style="width:280px;" oninput="reload()">
  <span class="text-muted" id="result-count"></span>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th>Severity</th><th>Package</th><th>PyPI Version</th><th>GitHub Releases</th>
        <th>GitHub</th><th>Reason</th><th>Flagged At</th><th>Recheck</th>
      </tr>
    </thead>
    <tbody id="flag-body">
      <tr><td colspan="7" class="text-muted" style="text-align:center;padding:30px;">Loading…</td></tr>
    </tbody>
  </table>
</div>

<!-- Detail modal -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center;">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto;padding:24px;position:relative;">
    <button onclick="closeModal()" style="position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;">✕</button>
    <div id="modal-content"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allData=[];

async function reload(){
  const sev=document.getElementById('sev-filter').value;
  const q=document.getElementById('search-input').value;
  const params=new URLSearchParams();
  if(sev)params.set('severity',sev);
  if(q)params.set('search',q);
  const data=await api('/api/flagged?'+params);
  allData=data;
  document.getElementById('result-count').textContent=data.length+' result'+(data.length!==1?'s':'');
  render(data);
}

function render(data){
  const tb=document.getElementById('flag-body');
  if(!data.length){tb.innerHTML='<tr><td colspan="7" class="empty-state">No flagged packages match the filters.</td></tr>';return;}
  tb.innerHTML=data.map((f,i)=>{
    const gh=f.github_owner?`<a href="https://github.com/${esc(f.github_owner)}/${esc(f.github_repo)}" target="_blank">${esc(f.github_owner)}/${esc(f.github_repo)}</a>`:'—';
    const ghRels=(f.github_releases||[]).slice(0,3).map(esc).join(', ')||'None';
    const rchk=recheckLabel(f.flagged_at);
    return `<tr style="cursor:pointer;" onclick="showDetail(${i})">
      <td><span class="badge ${esc(f.severity)}">${esc(f.severity)}</span></td>
      <td><a href="${esc(f.pypi_link)}" target="_blank" onclick="event.stopPropagation()">${esc(f.name)}</a></td>
      <td><code style="color:var(--green);">${esc(f.pypi_version||f.version)}</code></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"><code>${esc(ghRels)}</code></td>
      <td>${gh}</td>
      <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(f.reason)}</td>
      <td class="text-muted" style="white-space:nowrap;">${esc((f.flagged_at||'').slice(0,19))}</td>
      <td style="white-space:nowrap;">${rchk}</td>
    </tr>`;
  }).join('');
}
function recheckLabel(flaggedAt){
  if(!flaggedAt)return'<span class="text-muted">—</span>';
  const diff=Date.now()-new Date(flaggedAt).getTime();
  const oneHour=3600000;
  if(diff>=oneHour)return'<span style="color:var(--green);">✓ Rechecked</span>';
  const mins=Math.ceil((oneHour-diff)/60000);
  return`<span class="text-muted">in ${mins}m</span>`;
}

function showDetail(i){
  const f=allData[i];if(!f)return;
  const gh=f.github_owner?`<a href="https://github.com/${esc(f.github_owner)}/${esc(f.github_repo)}" target="_blank">${esc(f.github_owner)}/${esc(f.github_repo)}</a>`:'None found';
  const ghRels=(f.github_releases||[]).slice(0,10);
  const ghTags=(f.github_tags||[]).slice(0,10);
  let vHtml='';
  if(f.verification){
    const v=f.verification;
    vHtml=`<h3 style="margin-top:16px;">Verification Details</h3>
    <table style="font-size:12px;margin-top:8px;">
    <tr><td class="text-muted" style="padding-right:12px;">Repo exists</td><td>${v.repo_exists?'✅ Yes':'❌ No'}</td></tr>
    <tr><td class="text-muted">Has release</td><td>${v.has_release?'✅ Yes':'❌ No'}</td></tr>
    <tr><td class="text-muted">Has tag</td><td>${v.has_tag?'✅ Yes':'❌ No'}</td></tr>
    <tr><td class="text-muted">Candidates checked</td><td>${(v.tag_names_checked||[]).slice(0,5).map(esc).join(', ')}</td></tr>
    ${v.matched_release?`<tr><td class="text-muted">Matched release</td><td>${esc(v.matched_release)}</td></tr>`:''}
    ${v.matched_tag?`<tr><td class="text-muted">Matched tag</td><td>${esc(v.matched_tag)}</td></tr>`:''}
    </table>`;
  }
  let versionsHtml=`
    <h3 style="margin-top:16px;">Version Comparison</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px;">
      <div style="padding:12px;background:var(--bg);border-radius:8px;">
        <div class="text-muted" style="font-size:11px;margin-bottom:6px;">📦 PyPI Version</div>
        <code style="color:var(--green);font-size:16px;font-weight:bold;">${esc(f.pypi_version||f.version)}</code>
      </div>
      <div style="padding:12px;background:var(--bg);border-radius:8px;">
        <div class="text-muted" style="font-size:11px;margin-bottom:6px;">🐙 GitHub Releases (latest)</div>
        ${ghRels.length?ghRels.map(r=>`<code style="display:inline-block;margin:2px 4px 2px 0;padding:2px 6px;background:var(--bg2);border-radius:4px;font-size:12px;">${esc(r)}</code>`).join(''):'<span class="text-muted">None found</span>'}
      </div>
    </div>
    ${ghTags.length?`<div style="margin-top:8px;padding:12px;background:var(--bg);border-radius:8px;">
      <div class="text-muted" style="font-size:11px;margin-bottom:6px;">🏷️ GitHub Tags (latest)</div>
      ${ghTags.map(t=>`<code style="display:inline-block;margin:2px 4px 2px 0;padding:2px 6px;background:var(--bg2);border-radius:4px;font-size:12px;">${esc(t)}</code>`).join('')}
    </div>`:''}
  `;
  document.getElementById('modal-content').innerHTML=`
    <h2 style="margin-bottom:16px;"><span class="badge ${esc(f.severity)}">${esc(f.severity)}</span> ${esc(f.name)}</h2>
    <table style="font-size:13px;">
    <tr><td class="text-muted" style="padding:4px 14px 4px 0;">PyPI</td><td><a href="${esc(f.pypi_link)}" target="_blank">${esc(f.pypi_link)}</a></td></tr>
    <tr><td class="text-muted" style="padding:4px 14px 4px 0;">GitHub</td><td>${gh}</td></tr>
    <tr><td class="text-muted" style="padding:4px 14px 4px 0;">Author</td><td>${esc(f.author)} &lt;${esc(f.author_email)}&gt;</td></tr>
    <tr><td class="text-muted" style="padding:4px 14px 4px 0;">Summary</td><td>${esc(f.summary)}</td></tr>
    <tr><td class="text-muted" style="padding:4px 14px 4px 0;">Flagged at</td><td>${esc(f.flagged_at)}</td></tr>
    <tr><td class="text-muted" style="padding:4px 14px 4px 0;">1hr Recheck</td><td>${recheckLabel(f.flagged_at)}</td></tr>
    </table>
    ${versionsHtml}
    <div style="margin-top:12px;padding:12px;background:var(--bg);border-radius:8px;font-size:13px;">${esc(f.reason)}</div>
    ${vHtml}
    <div style="margin-top:16px;display:flex;gap:8px;">
      <a href="${esc(f.pypi_link)}" target="_blank" class="btn sm">Open PyPI ↗</a>
      ${f.github_owner?`<a href="https://github.com/${esc(f.github_owner)}/${esc(f.github_repo)}/releases" target="_blank" class="btn sm">Open GitHub Releases ↗</a>`:''}
    </div>
  `;
  document.getElementById('modal-overlay').style.display='flex';
}

function closeModal(){document.getElementById('modal-overlay').style.display='none';}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}

reload();
setInterval(reload,6000);
</script>
{% endblock %}
